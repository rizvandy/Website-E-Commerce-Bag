<style>
  /* Footer - Modern Clean Centered Layout */
  .footer {
    background: var(--bg-section);
    padding: 3.5rem 0 2rem;
    border-top: 1px solid var(--border);
    color: var(--text);
  }

  .footer-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 720px;
    margin: 0 auto;
  }

  .footer-logo {
    font-weight: 800;
    color: var(--primary);
    font-size: 1.5rem;
    letter-spacing: -0.02em;
    margin-bottom: 0.4rem;
  }

  .footer-tagline {
    color: var(--text-secondary);
    font-size: 0.88rem;
    line-height: 1.6;
    margin-bottom: 1.2rem;
    max-width: 480px;
  }

  .footer-social-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    margin-bottom: 1.8rem;
  }

  .footer-social-bar a {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: #fff;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    font-size: 0.95rem;
    transition: all .3s ease;
    text-decoration: none;
  }

  .footer-social-bar a:hover {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
    transform: translateY(-2px);
  }

  .footer-nav-list {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 1.8rem;
    list-style: none;
    padding: 0;
    margin: 0 0 1.8rem 0;
  }

  .footer-nav-list a {
    color: var(--text);
    font-weight: 500;
    font-size: 0.92rem;
    transition: color .25s ease;
    text-decoration: none;
  }

  .footer-nav-list a:hover {
    color: var(--primary);
  }

  .footer-newsletter-wrap {
    width: 100%;
    max-width: 420px;
    margin-bottom: 2rem;
  }

  .footer-newsletter-hint {
    font-size: 0.82rem;
    color: var(--text-secondary);
    margin-bottom: 0.6rem;
  }

  .newsletter-form {
    display: flex;
    gap: 0.5rem;
  }

  .newsletter-form .form-control {
    border-radius: 50px;
    border: 1.5px solid var(--border);
    font-size: 0.88rem;
    font-family: 'Inter', sans-serif;
    padding: 0.6rem 1.1rem;
    background: #ffffff;
  }

  .newsletter-form .form-control:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
  }

  .newsletter-form .btn-main {
    padding: 0.6rem 1.2rem;
    border-radius: 50px;
    width: auto;
    flex-shrink: 0;
  }

  .footer-divider {
    width: 100%;
    border: none;
    border-top: 1px solid var(--border);
    opacity: 0.7;
    margin: 0 0 1.5rem 0;
  }

  .footer-bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    flex-wrap: wrap;
    gap: 0.8rem;
  }

  .footer-bottom-text {
    color: var(--text-secondary);
    font-size: 0.85rem;
    margin-bottom: 0;
  }

  .footer-legal-links {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.85rem;
  }

  .footer-legal-links a {
    color: var(--text-secondary);
    text-decoration: none;
    transition: color .25s ease;
  }

  .footer-legal-links a:hover {
    color: var(--primary);
  }

  @media (max-width: 768px) {
    .footer {
      padding: 2.5rem 0 1.5rem;
    }

    .footer-nav-list {
      gap: 1rem;
      font-size: 0.88rem;
    }

    .footer-bottom-bar {
      flex-direction: column;
      text-align: center;
      gap: 0.6rem;
    }

    .footer-legal-links {
      justify-content: center;
    }
  }
</style>

<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <!-- Brand & Tagline -->
      <h5 class="footer-logo">MyBag</h5>
      <p class="footer-tagline" data-i18n="footer_tagline">Tas kulit premium yang dibuat untuk para penjelajah modern. Dirancang untuk bertahan, dibuat untuk menginspirasi.</p>

      <!-- Social Media -->
      <div class="footer-social-bar">
        <a href="#" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
        <a href="#" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
        <a href="#" aria-label="Twitter"><i class="bi bi-twitter-x"></i></a>
        <a href="#" aria-label="TikTok"><i class="bi bi-tiktok"></i></a>
      </div>

      <!-- Quick Links -->
      <ul class="footer-nav-list">
        <li><a href="beranda.html" data-i18n="nav_home">Beranda</a></li>
        <li><a href="produk.html" data-i18n="nav_products">Produk</a></li>
        <li><a href="tentang-kami.html" data-i18n="nav_about">Tentang Kami</a></li>
        <li><a href="kontak.html" data-i18n="nav_contact">Kontak</a></li>
      </ul>

      <!-- Newsletter -->
      <div class="footer-newsletter-wrap">
        <p class="footer-newsletter-hint" data-i18n="footer_newsletter_hint">Dapatkan info koleksi terbaru.</p>
        <form class="newsletter-form" id="newsletterForm" onsubmit="return handleNewsletterSubmit(event);">
          <input type="email" id="newsletterEmail" class="form-control" placeholder="Email Anda"
            data-i18n-placeholder="footer_email_placeholder" required>
          <button class="btn-main" type="submit" aria-label="Kirim"><i class="bi bi-send"></i></button>
        </form>
      </div>

      <hr class="footer-divider">

      <!-- Bottom Bar -->
      <div class="footer-bottom-bar">
        <p class="footer-bottom-text" data-i18n="footer_copyright">&copy; 2026 MyBag. Hak Cipta Dilindungi.</p>
        <div class="footer-legal-links">
          <a href="#" data-i18n="footer_terms">Syarat & Ketentuan</a>
          <span style="color:var(--border);">|</span>
          <a href="#" data-i18n="footer_privacy">Kebijakan Privasi</a>
        </div>
      </div>
    </div>
  </div>
</footer>

<!-- Scroll to Top -->
<button class="scroll-top-btn" id="scrollTopBtn" aria-label="Scroll to top">
  <i class="bi bi-arrow-up"></i>
</button>

<script>
  function handleNewsletterSubmit(e) {
    if (e) e.preventDefault();
    var input = document.getElementById('newsletterEmail') || document.querySelector('.newsletter-form input[type="email"]');
    var email = input ? input.value.trim() : '';
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      if (typeof showToast === 'function') {
        showToast(I18nStore.t('err_email'), 'bi-exclamation-circle-fill', 'error');
      } else {
        alert('Masukkan email yang valid.');
      }
      return false;
    }
    if (typeof showToast === 'function') {
      showToast(I18nStore.t('toast_newsletter_success'), 'bi-check-circle-fill', 'success');
    } else {
      alert('Terima kasih telah berlangganan!');
    }
    if (input) input.value = '';
    return false;
  }
</script>
