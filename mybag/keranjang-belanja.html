<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Keranjang belanja MyBag. Kelola item belanjaan Anda sebelum checkout.">
<title>MyBag — Keranjang Belanja</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="css/global.css" rel="stylesheet">
<style>
.cart-item{background:#fff;border:1px solid var(--border);border-radius:16px;padding:1.2rem;transition:all .3s cubic-bezier(0.4,0,0.2,1);}
.cart-item:hover{box-shadow:0 10px 30px rgba(79,70,229,0.06);border-color:rgba(79,70,229,0.15);}
.cart-item img{width:100px;height:100px;object-fit:contain;background:#ffffff;border-radius:12px;}
.cart-item .name{font-weight:600;}
.cart-item .price{color:var(--primary);font-weight:700;}

.qty-control{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:50px;overflow:hidden;width:fit-content;}
.qty-control button{background:#fff;border:none;width:34px;height:34px;color:var(--text);font-weight:600;transition:all .3s ease;cursor:pointer;font-family:'Inter',sans-serif;}
.qty-control button:hover{background:var(--primary-light);color:var(--primary);}
.qty-control span{width:40px;text-align:center;font-weight:600;font-size:0.95rem;}

.remove-btn{color:var(--danger);background:none;border:none;font-size:1.1rem;transition:all .3s cubic-bezier(0.4,0,0.2,1);cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.remove-btn:hover{background:rgba(239,68,68,0.08);transform:scale(1.1);}

.summary-card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:2rem;position:sticky;top:100px;}
.summary-row{display:flex;justify-content:space-between;margin-bottom:1rem;color:var(--text-secondary);font-size:0.95rem;}
.summary-total{display:flex;justify-content:space-between;font-weight:700;font-size:1.2rem;color:var(--text);border-top:1.5px solid var(--border);padding-top:1rem;margin-top:1rem;}

.empty-state{text-align:center;padding:5rem 1rem;}
.empty-state .empty-icon{width:80px;height:80px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:2rem;color:var(--primary);}

/* Cart item animation */
.cart-item{animation:slideIn .35s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(-15px);}to{opacity:1;transform:translateX(0);}}

@media (max-width:991px){
  .summary-card{position:static;margin-top:2rem;}
}
@media (max-width:576px){
  .cart-item img{width:75px;height:75px;}
}
</style>
</head>
<body>

<!-- Navbar -->
<div id="navbar"></div>

<!-- Cart -->
<section class="section" style="padding-top:7rem;">
  <div class="container">
    <h1 class="title mb-1 reveal">Keranjang Belanja</h1>
    <p class="subtitle mb-4 reveal" id="cartCount"></p>
    <div class="row g-4">
      <div class="col-lg-8">
        <div id="cartItems" class="d-flex flex-column gap-3"></div>
        <div id="emptyState" class="empty-state d-none">
          <div class="empty-icon"><i class="bi bi-bag-x"></i></div>
          <h5 class="fw-semibold mb-2">Keranjang Kosong</h5>
          <p class="subtitle mb-3">Belum ada produk di keranjang Anda.</p>
          <a href="produk.html" class="btn-outline-main">Mulai Belanja <i class="bi bi-arrow-right ms-1"></i></a>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="summary-card reveal">
          <h5 class="fw-semibold mb-4">Ringkasan Pesanan</h5>
          <div class="summary-row"><span>Subtotal</span><span id="sumSubtotal">Rp 0</span></div>
          <div class="summary-row"><span>Ongkos Kirim</span><span id="sumShipping">Rp 0</span></div>
          <div class="summary-total"><span>Total</span><span id="sumTotal">Rp 0</span></div>
          <button class="btn-main mt-4" id="checkoutBtn" style="width:100%;justify-content:center;">
            Checkout Order <i class="bi bi-arrow-right ms-1"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Footer -->
<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
var SHIPPING_FEE = 25000;

function renderCart(){
  var cart = CartStore.get();
  var container = document.getElementById('cartItems');
  var emptyState = document.getElementById('emptyState');
  var checkoutBtn = document.getElementById('checkoutBtn');
  var cartCountEl = document.getElementById('cartCount');

  if(cart.length === 0){
    container.innerHTML = '';
    emptyState.classList.remove('d-none');
    checkoutBtn.disabled = true;
    cartCountEl.textContent = '0 item';
  } else {
    emptyState.classList.add('d-none');
    checkoutBtn.disabled = false;
    var totalItems = cart.reduce(function(s,i){ return s + i.qty; }, 0);
    cartCountEl.textContent = totalItems + ' item' + (totalItems > 1 ? 's' : '');

    container.innerHTML = cart.map(function(item){
      return '<div class="cart-item d-flex align-items-center gap-3" data-id="' + item.id + '">' +
        '<a href="detail-produk.html?id=' + item.id + '"><img src="' + item.img + '" alt="' + item.name + '" loading="lazy"></a>' +
        '<div class="flex-grow-1">' +
          '<p class="name mb-1">' + item.name + '</p>' +
          '<p class="price mb-2">' + formatRupiah(item.price) + '</p>' +
          '<div class="qty-control">' +
            '<button class="decrease" aria-label="Kurangi">−</button>' +
            '<span>' + item.qty + '</span>' +
            '<button class="increase" aria-label="Tambah">+</button>' +
          '</div>' +
        '</div>' +
        '<div class="text-end">' +
          '<p class="fw-semibold mb-2" style="color:var(--text);font-size:0.95rem;">' + formatRupiah(item.price * item.qty) + '</p>' +
          '<button class="remove-btn" aria-label="Hapus"><i class="bi bi-trash3"></i></button>' +
        '</div>' +
      '</div>';
    }).join('');
  }
  updateTotals(cart);
}

function updateTotals(cart){
  var subtotal = cart.reduce(function(sum, item){ return sum + item.price * item.qty; }, 0);
  var shipping = cart.length > 0 ? SHIPPING_FEE : 0;
  var total = subtotal + shipping;
  document.getElementById('sumSubtotal').textContent = formatRupiah(subtotal);
  document.getElementById('sumShipping').textContent = formatRupiah(shipping);
  document.getElementById('sumTotal').textContent = formatRupiah(total);
}

document.getElementById('cartItems').addEventListener('click', function(e){
  var itemEl = e.target.closest('.cart-item');
  if(!itemEl) return;
  var id = Number(itemEl.dataset.id);

  if(e.target.classList.contains('increase')){
    var cart = CartStore.get();
    var item = cart.find(function(i){ return i.id === id; });
    if(item) CartStore.updateQty(id, item.qty + 1);
    renderCart();
  } else if(e.target.classList.contains('decrease')){
    var cart2 = CartStore.get();
    var item2 = cart2.find(function(i){ return i.id === id; });
    if(item2) CartStore.updateQty(id, item2.qty - 1);
    renderCart();
  } else if(e.target.closest('.remove-btn')){
    CartStore.remove(id);
    showToast('Item dihapus dari keranjang', 'bi-trash3', 'error');
    renderCart();
  }
});

document.getElementById('checkoutBtn').addEventListener('click', function(){
  var cart = CartStore.get();
  if(cart.length > 0){
    window.location.href = 'pesanan-berhasil.html';
  }
});

document.addEventListener('DOMContentLoaded', function(){
  renderCart();
});
</script>
</body>
</html>
