<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Keranjang belanja MyBag Anda. Tinjau produk pilihan Anda dan lanjut ke pembayaran.">
<title>MyBag — Keranjang Belanja</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="css/global.css" rel="stylesheet">
<style>
.cart-section{padding:7rem 0 4rem;min-height:75vh;}
.cart-table-box{background:#fff;border-radius:20px;border:1px solid var(--border);padding:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,0.03);}

.cart-item{padding:1.2rem 0;border-bottom:1px solid var(--border);transition:all .3s ease;}
.cart-item:last-child{border-bottom:none;}
.cart-item img{width:80px;height:80px;object-fit:cover;border-radius:12px;border:1px solid var(--border);}
.cart-item .name{font-weight:600;font-size:1.02rem;color:var(--text);}
.cart-item .price{color:var(--primary);font-weight:700;font-size:0.95rem;}

.qty-control{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:50px;overflow:hidden;width:fit-content;}
.qty-control button{background:#fff;border:none;width:32px;height:32px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s ease;color:var(--text);}
.qty-control button:hover{background:var(--primary-light);color:var(--primary);}
.qty-control span{width:36px;text-align:center;font-weight:600;font-size:0.95rem;}

.remove-btn{color:var(--danger);background:none;border:none;font-size:1.1rem;transition:all .3s cubic-bezier(0.4,0,0.2,1);cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.remove-btn:hover{background:rgba(239,68,68,0.08);transform:scale(1.1);}

.summary-card{background:#fff;border-radius:20px;border:1px solid var(--border);padding:1.8rem;box-shadow:0 4px 20px rgba(0,0,0,0.03);position:sticky;top:90px;}
.summary-card h5{font-weight:700;margin-bottom:1.5rem;}
.summary-row{display:flex;justify-content:space-between;margin-bottom:1rem;font-size:0.95rem;color:var(--text-secondary);}
.summary-row.total{border-top:1px solid var(--border);padding-top:1rem;margin-top:1rem;font-size:1.15rem;font-weight:800;color:var(--text);}
.summary-row.total span:last-child{color:var(--primary);}

.promo-box{display:flex;gap:0.5rem;margin-bottom:1.5rem;}
.promo-box input{border-radius:50px;border:1.5px solid var(--border);padding:0.55rem 1rem;font-size:0.85rem;}
.promo-box button{border-radius:50px;padding:0.55rem 1.2rem;font-size:0.85rem;flex-shrink:0;}

.empty-state{text-align:center;padding:5rem 1rem;}
.empty-state .empty-icon{width:80px;height:80px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:2.2rem;color:var(--primary);}
</style>
</head>
<body>

<!-- Navbar -->
<div id="navbar"></div>

<!-- Cart Content -->
<section class="cart-section">
  <div class="container">
    <div class="text-start mb-4 reveal revealed">
      <p class="eyebrow" data-i18n="cart_eyebrow">KERANJANG BELANJA</p>
      <h1 class="title" data-i18n="cart_title">Pesanan Saya</h1>
      <p class="subtitle" id="cartCount">0 item tersimpan</p>
    </div>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="cart-table-box reveal revealed">
          <div id="cartItems">
            <!-- Items injected here -->
          </div>

          <div id="emptyState" class="empty-state d-none">
            <div class="empty-icon"><i class="bi bi-bag-x"></i></div>
            <h5 class="fw-semibold mb-2" data-i18n="cart_empty_title">Keranjang Anda Kosong</h5>
            <p class="subtitle mb-4" data-i18n="cart_empty_desc">Belum ada produk di keranjang belanja Anda.</p>
            <a href="produk.html" class="btn-main"><span data-i18n="btn_start_shopping">Mulai Cari Produk</span> <i class="bi bi-arrow-right ms-1"></i></a>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="summary-card reveal revealed">
          <h5 data-i18n="cart_summary_title">Ringkasan Pesanan</h5>

          <div class="summary-row">
            <span data-i18n="cart_subtotal_label">Subtotal</span>
            <span id="sumSubtotal">Rp 0</span>
          </div>
          <div class="summary-row">
            <span data-i18n="cart_shipping_label">Pengiriman</span>
            <span id="sumShipping">GRATIS</span>
          </div>
          <div class="summary-row total">
            <span data-i18n="cart_total_label">Total Pembayaran</span>
            <span id="sumTotal">Rp 0</span>
          </div>

          <button class="btn-main w-100 justify-content-center mt-4" id="checkoutBtn" disabled>
            <span data-i18n="btn_checkout">Lanjut ke Pembayaran</span> <i class="bi bi-arrow-right ms-1"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Footer -->
<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
var SHIPPING_FEE = 25000;

function renderCart(){
  var cart = CartStore.get();
  var container = document.getElementById('cartItems');
  var emptyState = document.getElementById('emptyState');
  var checkoutBtn = document.getElementById('checkoutBtn');
  var cartCountEl = document.getElementById('cartCount');

  if(cart.length === 0){
    container.innerHTML = '';
    emptyState.classList.remove('d-none');
    checkoutBtn.disabled = true;
    cartCountEl.textContent = '0 ' + I18nStore.t('wishlist_count_singular');
  } else {
    emptyState.classList.add('d-none');
    checkoutBtn.disabled = false;
    var totalItems = cart.reduce(function(s,i){ return s + i.qty; }, 0);
    var itemWord = totalItems > 1 ? I18nStore.t('wishlist_count_plural') : I18nStore.t('wishlist_count_singular');
    cartCountEl.textContent = totalItems + ' ' + itemWord;

    container.innerHTML = cart.map(function(item){
      var productRef = PRODUCTS.find(function(p){ return p.id === item.id; });
      var pTrans = productRef ? I18nStore.getProduct(productRef) : item;
      return '<div class="cart-item d-flex align-items-center gap-3" data-id="' + item.id + '">' +
        '<a href="detail-produk.html?id=' + item.id + '"><img src="' + item.img + '" alt="' + pTrans.name + '" loading="lazy"></a>' +
        '<div class="flex-grow-1">' +
          '<p class="name mb-1">' + pTrans.name + '</p>' +
          '<p class="price mb-2">' + formatRupiah(item.price) + '</p>' +
          '<div class="qty-control">' +
            '<button class="decrease" aria-label="Kurangi">−</button>' +
            '<span>' + item.qty + '</span>' +
            '<button class="increase" aria-label="Tambah">+</button>' +
          '</div>' +
        '</div>' +
        '<div class="text-end">' +
          '<p class="fw-semibold mb-2" style="color:var(--text);font-size:0.95rem;">' + formatRupiah(item.price * item.qty) + '</p>' +
          '<button class="remove-btn" aria-label="Hapus"><i class="bi bi-trash3"></i></button>' +
        '</div>' +
      '</div>';
    }).join('');
  }
  updateTotals(cart);
}

function renderCartTable() {
  renderCart();
}

function updateTotals(cart){
  var subtotal = cart.reduce(function(sum, item){ return sum + item.price * item.qty; }, 0);
  var shipping = cart.length > 0 ? SHIPPING_FEE : 0;
  var total = subtotal + shipping;
  document.getElementById('sumSubtotal').textContent = formatRupiah(subtotal);
  document.getElementById('sumShipping').textContent = cart.length > 0 ? formatRupiah(shipping) : I18nStore.t('cart_shipping_val');
  document.getElementById('sumTotal').textContent = formatRupiah(total);
}

document.getElementById('cartItems').addEventListener('click', function(e){
  var itemEl = e.target.closest('.cart-item');
  if(!itemEl) return;
  var id = Number(itemEl.dataset.id);

  if(e.target.classList.contains('increase')){
    var cart = CartStore.get();
    var item = cart.find(function(i){ return i.id === id; });
    if(item) CartStore.updateQty(id, item.qty + 1);
    renderCart();
  } else if(e.target.classList.contains('decrease')){
    var cart2 = CartStore.get();
    var item2 = cart2.find(function(i){ return i.id === id; });
    if(item2){
      if(item2.qty > 1){
        CartStore.updateQty(id, item2.qty - 1);
      } else {
        var productToRemove = PRODUCTS.find(function(p){ return p.id === id; });
        CartStore.remove(id);
        if (productToRemove) {
          var pTrans = I18nStore.getProduct(productToRemove);
          showToast(pTrans.name + ' ' + I18nStore.t('toast_removed_cart'), 'bi-trash3', 'error');
        } else {
          showToast(I18nStore.t('toast_removed_cart'), 'bi-trash3', 'error');
        }
      }
    }
    renderCart();
  } else if(e.target.closest('.remove-btn')){
    var productToRemove2 = PRODUCTS.find(function(p){ return p.id === id; });
    CartStore.remove(id);
    if (productToRemove2) {
      var pTrans2 = I18nStore.getProduct(productToRemove2);
      showToast(pTrans2.name + ' ' + I18nStore.t('toast_removed_cart'), 'bi-trash3', 'error');
    } else {
      showToast(I18nStore.t('toast_removed_cart'), 'bi-trash3', 'error');
    }
    renderCart();
  }
});

document.getElementById('checkoutBtn').addEventListener('click', function(){
  var cart = CartStore.get();
  if(cart.length > 0){
    window.location.href = 'pesanan-berhasil.html';
  }
});

document.addEventListener('DOMContentLoaded', function(){
  renderCart();
});
</script>
</body>
</html>
