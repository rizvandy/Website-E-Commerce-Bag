<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Hubungi MyBag — kami siap membantu pertanyaan Anda tentang produk tas kulit premium kami.">
<title>MyBag — Kontak</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="css/global.css" rel="stylesheet">
<style>
.contact-info-item{display:flex;align-items:flex-start;gap:1rem;margin-bottom:1.6rem;}
.contact-info-item .icon-circle{width:48px;height:48px;flex-shrink:0;border-radius:14px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:1.2rem;transition:all .3s ease;}
.contact-info-item:hover .icon-circle{background:var(--primary);color:#fff;transform:scale(1.05);}
.contact-info-item h6{font-weight:600;margin-bottom:0.2rem;}
.contact-info-item p{color:var(--text-secondary);margin-bottom:0;font-size:0.92rem;}

.social-links{display:flex;gap:0.8rem;margin-top:1.5rem;}
.social-links a{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);transition:all .3s cubic-bezier(0.4,0,0.2,1);}
.social-links a:hover{background:var(--primary);color:#fff;border-color:var(--primary);transform:translateY(-3px);box-shadow:0 4px 12px rgba(79,70,229,0.2);}

.contact-img{border-radius:16px;overflow:hidden;margin-top:2rem;}
.contact-img img{width:100%;height:200px;object-fit:cover;transition:transform .5s ease;}
.contact-img:hover img{transform:scale(1.05);}
</style>
</head>
<body>

<!-- Navbar -->
<div id="navbar"></div>

<!-- Contact -->
<section class="section" style="padding-top:7rem;">
  <div class="container">
    <div class="row g-5">
      <div class="col-lg-5 reveal-left revealed">
        <p class="eyebrow" data-i18n="contact_eyebrow">Hubungi Kami</p>
        <h1 class="title mb-4" data-i18n="contact_title">Hubungi Penjelajah Modern</h1>

        <div class="contact-info-item">
          <div class="icon-circle"><i class="bi bi-geo-alt"></i></div>
          <div>
            <h6 data-i18n="contact_addr_title">Alamat</h6>
            <p data-i18n="contact_addr_val">Jl. Puncak Indah, Surabaya, Indonesia</p>
          </div>
        </div>
        <div class="contact-info-item">
          <div class="icon-circle"><i class="bi bi-envelope"></i></div>
          <div>
            <h6 data-i18n="contact_email_title">Email</h6>
            <p>hello@mybag.com</p>
          </div>
        </div>
        <div class="contact-info-item">
          <div class="icon-circle"><i class="bi bi-telephone"></i></div>
          <div>
            <h6 data-i18n="contact_phone_title">Telepon</h6>
            <p>+62 812 3456 7890</p>
          </div>
        </div>

        <div class="social-links">
          <a href="#" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
          <a href="#" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
          <a href="#" aria-label="Twitter"><i class="bi bi-twitter-x"></i></a>
          <a href="#" aria-label="TikTok"><i class="bi bi-tiktok"></i></a>
        </div>
      </div>

      <div class="col-lg-7 reveal-right revealed">
        <div class="form-box">
          <form id="contactForm" novalidate>
            <div class="row g-3">
              <div class="col-md-6">
                <label for="fullName" data-i18n="form_fullname">Nama Lengkap</label>
                <input type="text" class="form-control" id="fullName" placeholder="Nama lengkap Anda" data-i18n-placeholder="form_fullname_ph">
                <div class="invalid-msg" id="nameError" data-i18n="err_name">Nama wajib diisi.</div>
              </div>
              <div class="col-md-6">
                <label for="contactEmail" data-i18n="form_email">Email</label>
                <input type="email" class="form-control" id="contactEmail" placeholder="nama@email.com" data-i18n-placeholder="form_email_ph">
                <div class="invalid-msg" id="contactEmailError" data-i18n="err_email">Masukkan email yang valid.</div>
              </div>
              <div class="col-12">
                <label for="subject" data-i18n="form_subject">Subjek</label>
                <input type="text" class="form-control" id="subject" placeholder="Subjek pesan" data-i18n-placeholder="form_subject_ph">
                <div class="invalid-msg" id="subjectError" data-i18n="err_subject">Subjek wajib diisi.</div>
              </div>
              <div class="col-12">
                <label for="message" data-i18n="form_message">Pesan</label>
                <textarea class="form-control" id="message" rows="5" placeholder="Tulis pesan Anda..." data-i18n-placeholder="form_message_ph"></textarea>
                <div class="invalid-msg" id="messageError" data-i18n="err_message">Pesan wajib diisi.</div>
              </div>
              <div class="col-12">
                <button type="submit" class="btn-main" style="width:100%;justify-content:center;"><span data-i18n="btn_send_message">Kirim Pesan</span> <i class="bi bi-send ms-1"></i></button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Footer -->
<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
var contactForm = document.getElementById('contactForm');
var fullName = document.getElementById('fullName');
var contactEmail = document.getElementById('contactEmail');
var subject = document.getElementById('subject');
var message = document.getElementById('message');

function isValidEmail(value){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
}

function setError(input, errorEl, show){
  input.classList.toggle('is-invalid', show);
  errorEl.style.display = show ? 'block' : 'none';
}

[fullName, contactEmail, subject, message].forEach(function(input){
  input.addEventListener('blur', function(){
    if(input === contactEmail){
      setError(input, document.getElementById('contactEmailError'), !input.value.trim() || !isValidEmail(input.value.trim()));
    } else {
      var errorId = input === fullName ? 'nameError' : input === subject ? 'subjectError' : 'messageError';
      setError(input, document.getElementById(errorId), !input.value.trim());
    }
  });
  input.addEventListener('input', function(){
    if(input.classList.contains('is-invalid')){
      if(input === contactEmail){
        if(input.value.trim() && isValidEmail(input.value.trim())) setError(input, document.getElementById('contactEmailError'), false);
      } else {
        var errorId2 = input === fullName ? 'nameError' : input === subject ? 'subjectError' : 'messageError';
        if(input.value.trim()) setError(input, document.getElementById(errorId2), false);
      }
    }
  });
});

contactForm.addEventListener('submit', function(e){
  e.preventDefault();
  var valid = true;

  if(!fullName.value.trim()){
    setError(fullName, document.getElementById('nameError'), true); valid = false;
  } else { setError(fullName, document.getElementById('nameError'), false); }

  if(!contactEmail.value.trim() || !isValidEmail(contactEmail.value.trim())){
    setError(contactEmail, document.getElementById('contactEmailError'), true); valid = false;
  } else { setError(contactEmail, document.getElementById('contactEmailError'), false); }

  if(!subject.value.trim()){
    setError(subject, document.getElementById('subjectError'), true); valid = false;
  } else { setError(subject, document.getElementById('subjectError'), false); }

  if(!message.value.trim()){
    setError(message, document.getElementById('messageError'), true); valid = false;
  } else { setError(message, document.getElementById('messageError'), false); }

  if(valid){
    showToast(I18nStore.t('toast_contact_success'), 'bi-check-circle-fill', 'success');
    contactForm.reset();
  }
});
</script>
</body>
</html>
