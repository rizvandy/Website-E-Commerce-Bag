<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Login ke akun MyBag Anda untuk melanjutkan belanja tas kulit premium.">
<title>MyBag — Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="css/global.css" rel="stylesheet">
<style>
.login-section{min-height:100vh;display:flex;align-items:center;padding:7rem 0 3rem;position:relative;overflow:hidden;}
.login-section::before{content:'';position:absolute;top:-50%;right:-20%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle, rgba(79,70,229,0.08) 0%, transparent 70%);}
.login-section::after{content:'';position:absolute;bottom:-30%;left:-10%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle, rgba(79,70,229,0.06) 0%, transparent 70%);}

.login-box{position:relative;z-index:1;max-width:440px;margin:0 auto;animation:loginFade .6s cubic-bezier(0.4,0,0.2,1);}
@keyframes loginFade{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.login-box .brand-icon{width:56px;height:56px;border-radius:16px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;margin:0 auto 1.5rem;}

.forgot-link{font-size:0.85rem;color:var(--text-secondary);transition:color .3s ease;}
.forgot-link:hover{color:var(--primary);}
.register-text{text-align:center;margin-top:1.5rem;color:var(--text-secondary);font-size:0.9rem;}
.register-text a{color:var(--primary);font-weight:600;transition:color .3s ease;}
.register-text a:hover{color:var(--hover);}

.divider{display:flex;align-items:center;margin:1.5rem 0;color:var(--text-secondary);font-size:0.85rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider::before{margin-right:1rem;}
.divider::after{margin-left:1rem;}

.social-login{display:flex;gap:0.8rem;}
.social-login button{flex:1;padding:0.7rem;border:1.5px solid var(--border);border-radius:12px;background:#fff;font-size:1.2rem;cursor:pointer;transition:all .3s ease;color:var(--text);}
.social-login button:hover{border-color:var(--primary);color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 12px rgba(79,70,229,0.1);}
</style>
</head>
<body>

<!-- Navbar -->
<div id="navbar"></div>

<!-- Login -->
<section class="login-section">
  <div class="container">
    <div class="login-box">
      <div class="form-box">
        <div class="brand-icon">M</div>
        <h2 style="font-weight:700;font-size:1.8rem;text-align:center;margin-bottom:0.3rem;" data-i18n="login_title">Selamat Datang Kembali</h2>
        <p class="subtitle" style="text-align:center;margin-bottom:2rem;" data-i18n="login_subtitle">Masuk untuk melanjutkan belanja Anda.</p>

        <div class="social-login mb-3">
          <button type="button" aria-label="Login with Google"><i class="bi bi-google"></i></button>
          <button type="button" aria-label="Login with Facebook"><i class="bi bi-facebook"></i></button>
          <button type="button" aria-label="Login with Apple"><i class="bi bi-apple"></i></button>
        </div>

        <div class="divider" data-i18n="login_divider">atau masuk dengan email</div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="email" data-i18n="form_email">Alamat Email</label>
            <input type="email" class="form-control" id="email" placeholder="nama@email.com" data-i18n-placeholder="form_email_ph">
            <div class="invalid-msg" id="emailError" data-i18n="err_email">Masukkan email yang valid.</div>
          </div>
          <div class="mb-3">
            <label for="password" data-i18n="form_password">Password</label>
            <div class="password-wrap">
              <input type="password" class="form-control" id="password" placeholder="Masukkan password" data-i18n-placeholder="form_password_ph">
              <button type="button" class="toggle-pass" id="togglePass" aria-label="Toggle password"><i class="bi bi-eye"></i></button>
            </div>
            <div class="invalid-msg" id="passwordError" data-i18n="err_password">Password wajib diisi (min. 6 karakter).</div>
          </div>
          <div class="text-end mb-4">
            <a href="#" class="forgot-link" data-i18n="login_forgot">Lupa kata sandi?</a>
          </div>
          <button type="submit" class="btn-main" style="width:100%;justify-content:center;"><span data-i18n="btn_sign_in">Masuk</span> <i class="bi bi-arrow-right ms-1"></i></button>
        </form>
        <p class="register-text"><span data-i18n="login_no_account">Belum punya akun?</span> <a href="register.html" data-i18n="login_register_link">Daftar sekarang</a></p>
      </div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
var loginForm = document.getElementById('loginForm');
var emailInput = document.getElementById('email');
var passwordInput = document.getElementById('password');

function isValidEmail(value){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
}

function setError(input, errorEl, show){
  input.classList.toggle('is-invalid', show);
  errorEl.style.display = show ? 'block' : 'none';
}

emailInput.addEventListener('input', function(){
  if(emailInput.classList.contains('is-invalid') && emailInput.value.trim() && isValidEmail(emailInput.value.trim())){
    setError(emailInput, document.getElementById('emailError'), false);
  }
});
passwordInput.addEventListener('input', function(){
  if(passwordInput.classList.contains('is-invalid') && passwordInput.value.trim().length >= 6){
    setError(passwordInput, document.getElementById('passwordError'), false);
  }
});

loginForm.addEventListener('submit', function(e){
  e.preventDefault();
  var valid = true;

  if(!emailInput.value.trim() || !isValidEmail(emailInput.value.trim())){
    setError(emailInput, document.getElementById('emailError'), true);
    valid = false;
  } else {
    setError(emailInput, document.getElementById('emailError'), false);
  }

  if(!passwordInput.value.trim() || passwordInput.value.trim().length < 6){
    setError(passwordInput, document.getElementById('passwordError'), true);
    valid = false;
  } else {
    setError(passwordInput, document.getElementById('passwordError'), false);
  }

  if(valid){
    showToast(I18nStore.t('toast_login_success'), 'bi-check-circle-fill', 'success');
    setTimeout(function(){ window.location.href = 'beranda.html'; }, 1500);
  }
});

document.getElementById('togglePass').addEventListener('click', function(){
  var isPassword = passwordInput.type === 'password';
  passwordInput.type = isPassword ? 'text' : 'password';
  this.innerHTML = isPassword ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
});
</script>
</body>
</html>
