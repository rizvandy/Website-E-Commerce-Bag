<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Jelajahi koleksi tas kulit premium MyBag. Temukan tas travel, daily, dan premium yang sempurna untuk Anda.">
<title>MyBag — Explore Collection</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="css/global.css" rel="stylesheet">
<style>
/* Search */
.search-box{position:relative;max-width:420px;}
.search-box input{border-radius:50px;border:1.5px solid var(--border);padding:0.7rem 1.2rem 0.7rem 2.8rem;background:#fff;font-family:'Inter',sans-serif;transition:all .3s ease;}
.search-box input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,0.1);}
.search-box i{position:absolute;left:1.1rem;top:50%;transform:translateY(-50%);color:var(--text-secondary);}

/* Filters */
.filter-btn{background:#fff;border:1.5px solid var(--border);color:var(--text);padding:0.55rem 1.4rem;border-radius:50px;font-weight:500;font-size:0.9rem;font-family:'Inter',sans-serif;transition:all .3s cubic-bezier(0.4,0,0.2,1);cursor:pointer;}
.filter-btn.active,.filter-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 12px rgba(79,70,229,0.2);}

/* Pagination */
.page-btn{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--border);background:#fff;color:var(--text);display:flex;align-items:center;justify-content:center;font-weight:500;transition:all .3s cubic-bezier(0.4,0,0.2,1);cursor:pointer;font-family:'Inter',sans-serif;}
.page-btn.active,.page-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 12px rgba(79,70,229,0.2);}

/* Product grid transition */
#productGrid .col-lg-3{animation:fadeUp .4s ease forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- Navbar -->
<div id="navbar"></div>

<!-- Products -->
<section class="section" style="padding-top:7rem;">
  <div class="container">
    <div class="text-center mb-5 reveal">
      <p class="eyebrow">Koleksi Kami</p>
      <h1 class="title">Explore Collection</h1>
      <p class="subtitle">Temukan tas kulit premium yang sesuai dengan gaya perjalanan Anda.</p>
    </div>

    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4 reveal">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="text" id="searchInput" class="form-control" placeholder="Cari produk...">
      </div>
      <div class="d-flex flex-wrap gap-2" id="filterGroup">
        <button class="filter-btn active" data-cat="all">All</button>
        <button class="filter-btn" data-cat="travel">Travel</button>
        <button class="filter-btn" data-cat="daily">Daily</button>
        <button class="filter-btn" data-cat="premium">Premium</button>
      </div>
    </div>

    <div class="row g-4" id="productGrid">
      <!-- Cards injected by JS -->
    </div>

    <p class="text-center subtitle mt-4 d-none" id="noResults"><i class="bi bi-emoji-frown me-2"></i>Tidak ada produk yang cocok.</p>

    <!-- Pagination -->
    <div class="d-flex justify-content-center gap-2 mt-5" id="pagination"></div>
  </div>
</section>

<!-- Footer -->
<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
// Use PRODUCTS from app.js
var activeCat = 'all';
var searchTerm = '';
var currentPage = 1;
var perPage = 4;

function getFiltered(){
  return PRODUCTS.filter(function(p){
    var matchCat = activeCat === 'all' || p.cat === activeCat;
    var matchSearch = p.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                      p.cat.toLowerCase().includes(searchTerm.toLowerCase());
    return matchCat && matchSearch;
  });
}

function render(){
  var grid = document.getElementById('productGrid');
  var filtered = getFiltered();
  var totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
  if(currentPage > totalPages) currentPage = totalPages;
  var start = (currentPage - 1) * perPage;
  var pageItems = filtered.slice(start, start + perPage);

  grid.innerHTML = '';
  document.getElementById('noResults').classList.toggle('d-none', filtered.length > 0);

  pageItems.forEach(function(p, i){
    var col = document.createElement('div');
    col.className = 'col-6 col-md-6 col-lg-4';
    col.style.animationDelay = (i * 0.08) + 's';
    col.innerHTML =
      '<div class="product-card">' +
        '<a href="detail-produk.html?id=' + p.id + '">' +
          '<div class="img-wrap">' +
            '<img src="' + p.img + '" alt="' + p.name + '" loading="lazy">' +
            '<button class="wishlist-quick-btn" data-wishlist-id="' + p.id + '" onclick="toggleWishlistProduct(' + p.id + ', event);"><i class="bi bi-heart"></i></button>' +
            '<button class="quick-view-btn" onclick="showQuickView(' + p.id + ', event);"><i class="bi bi-eye"></i> Quick View</button>' +
          '</div>' +
        '</a>' +
        '<div class="body">' +
          '<p class="cat-tag mb-1">' + p.cat + '</p>' +
          '<h6 class="fw-semibold mb-1">' + p.name + '</h6>' +
          '<p class="price mb-2">' + formatRupiah(p.price) + '</p>' +
          '<button class="btn-main w-100 justify-content-center" data-id="' + p.id + '">Add <i class="bi bi-bag-plus"></i></button>' +
        '</div>' +
      '</div>';
    grid.appendChild(col);
  });

  renderPagination(totalPages);
  updateWishlistButtons();
}

function renderPagination(totalPages){
  var pag = document.getElementById('pagination');
  pag.innerHTML = '';
  for(var i=1;i<=totalPages;i++){
    var btn = document.createElement('button');
    btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
    btn.textContent = i;
    btn.dataset.page = i;
    pag.appendChild(btn);
  }
}

// Event delegation for Add to Cart
document.getElementById('productGrid').addEventListener('click', function(e){
  var btn = e.target.closest('button[data-id]');
  if(!btn) return;
  var id = Number(btn.dataset.id);
  var product = PRODUCTS.find(function(p){ return p.id === id; });
  if(product) {
    CartStore.add(product);
    triggerButtonFeedback(btn);
  }
});

// Pagination clicks
document.getElementById('pagination').addEventListener('click', function(e){
  var btn = e.target.closest('.page-btn');
  if(!btn) return;
  currentPage = Number(btn.dataset.page);
  render();
  window.scrollTo({top:0,behavior:'smooth'});
});

document.getElementById('searchInput').addEventListener('input', function(e){
  searchTerm = e.target.value;
  currentPage = 1;
  render();
});

document.getElementById('filterGroup').addEventListener('click', function(e){
  if(!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  e.target.classList.add('active');
  activeCat = e.target.dataset.cat;
  currentPage = 1;
  render();
});

document.addEventListener('DOMContentLoaded', function(){
  render();
});
</script>
</body>
</html>
