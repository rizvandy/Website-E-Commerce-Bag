<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Buat akun MyBag Anda untuk mulai berbelanja tas kulit premium.">
<title>MyBag — Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="css/global.css" rel="stylesheet">
<style>
.register-section{min-height:100vh;display:flex;align-items:center;padding:7rem 0 3rem;position:relative;overflow:hidden;}
.register-section::before{content:'';position:absolute;top:-40%;left:-15%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle, rgba(79,70,229,0.08) 0%, transparent 70%);}
.register-section::after{content:'';position:absolute;bottom:-35%;right:-10%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle, rgba(79,70,229,0.06) 0%, transparent 70%);}

.register-box{position:relative;z-index:1;max-width:480px;margin:0 auto;animation:registerFade .6s cubic-bezier(0.4,0,0.2,1);}
@keyframes registerFade{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.register-box .brand-icon{width:56px;height:56px;border-radius:16px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;margin:0 auto 1.5rem;}

.login-text{text-align:center;margin-top:1.5rem;color:var(--text-secondary);font-size:0.9rem;}
.login-text a{color:var(--primary);font-weight:600;transition:color .3s ease;}
.login-text a:hover{color:var(--hover);}

.password-strength{height:4px;border-radius:4px;background:var(--border);margin-top:0.5rem;overflow:hidden;}
.password-strength .bar{height:100%;border-radius:4px;transition:all .3s ease;width:0;}
.strength-text{font-size:0.75rem;margin-top:0.3rem;font-weight:500;}

.terms-check{display:flex;align-items:flex-start;gap:0.75rem;margin-top:0.5rem;}
.terms-check input[type="checkbox"]{
  flex-shrink:0;
  margin-top:0.2rem;
  accent-color:var(--primary);
  width:18px;
  height:18px;
  cursor:pointer;
}
.terms-check label{
  font-size:0.85rem;
  color:var(--text-secondary);
  cursor:pointer;
  line-height:1.4;
}
.terms-check label a{color:var(--primary);font-weight:500;}
</style>
</head>
<body>

<!-- Navbar -->
<div id="navbar"></div>

<!-- Register -->
<section class="register-section">
  <div class="container">
    <div class="register-box">
      <div class="form-box">
        <div class="brand-icon">M</div>
        <h2 style="font-weight:700;font-size:1.8rem;text-align:center;margin-bottom:0.3rem;" data-i18n="reg_title">Create Account</h2>
        <p class="subtitle" style="text-align:center;margin-bottom:2rem;" data-i18n="reg_subtitle">Bergabung dan nikmati belanja premium.</p>

        <form id="registerForm" novalidate>
          <div class="mb-3">
            <label for="regName" data-i18n="form_fullname">Nama Lengkap</label>
            <input type="text" class="form-control" id="regName" placeholder="Nama lengkap Anda" data-i18n-placeholder="form_fullname_ph">
            <div class="invalid-msg" id="regNameError" data-i18n="err_name">Nama wajib diisi (min. 3 karakter).</div>
          </div>
          <div class="mb-3">
            <label for="regEmail" data-i18n="form_email">Alamat Email</label>
            <input type="email" class="form-control" id="regEmail" placeholder="nama@email.com" data-i18n-placeholder="form_email_ph">
            <div class="invalid-msg" id="regEmailError" data-i18n="err_email">Masukkan email yang valid.</div>
          </div>
          <div class="mb-3">
            <label for="regPassword" data-i18n="form_password">Password</label>
            <div class="password-wrap">
              <input type="password" class="form-control" id="regPassword" placeholder="Buat password (min. 6 karakter)" data-i18n-placeholder="reg_pass_ph">
              <button type="button" class="toggle-pass" id="togglePass1" aria-label="Toggle password"><i class="bi bi-eye"></i></button>
            </div>
            <div class="invalid-msg" id="regPasswordError" data-i18n="err_password">Password wajib diisi (min. 6 karakter).</div>
            <div class="password-strength"><div class="bar" id="strengthBar"></div></div>
            <div class="strength-text" id="strengthText"></div>
          </div>
          <div class="mb-3">
            <label for="regConfirm" data-i18n="reg_confirm_pass">Konfirmasi Password</label>
            <div class="password-wrap">
              <input type="password" class="form-control" id="regConfirm" placeholder="Ulangi password" data-i18n-placeholder="reg_confirm_pass_ph">
              <button type="button" class="toggle-pass" id="togglePass2" aria-label="Toggle password"><i class="bi bi-eye"></i></button>
            </div>
            <div class="invalid-msg" id="regConfirmError" data-i18n="err_confirm_password">Password tidak cocok.</div>
          </div>
          <div class="terms-check mb-4">
            <input type="checkbox" id="termsCheck">
            <label for="termsCheck" data-i18n="reg_agree">Saya setuju dengan Syarat & Ketentuan serta Kebijakan Privasi</label>
          </div>
          <div class="invalid-msg mb-3" id="termsError" style="text-align:center;" data-i18n="err_terms">Anda harus menyetujui syarat & ketentuan.</div>
          <button type="submit" class="btn-main" style="width:100%;justify-content:center;"><span data-i18n="btn_sign_up">Create Account</span> <i class="bi bi-arrow-right ms-1"></i></button>
        </form>
        <p class="login-text"><span data-i18n="reg_has_account">Already have an account?</span> <a href="login.html" data-i18n="reg_login_link">Login</a></p>
      </div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
var regForm = document.getElementById('registerForm');
var regName = document.getElementById('regName');
var regEmail = document.getElementById('regEmail');
var regPassword = document.getElementById('regPassword');
var regConfirm = document.getElementById('regConfirm');
var termsCheck = document.getElementById('termsCheck');
var strengthBar = document.getElementById('strengthBar');
var strengthText = document.getElementById('strengthText');

function isValidEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

function setError(input, errorEl, show){
  input.classList.toggle('is-invalid', show);
  errorEl.style.display = show ? 'block' : 'none';
}

regPassword.addEventListener('input', function(){
  var val = regPassword.value;
  var score = 0;
  if(val.length >= 6) score++;
  if(val.length >= 10) score++;
  if(/[A-Z]/.test(val)) score++;
  if(/[0-9]/.test(val)) score++;
  if(/[^A-Za-z0-9]/.test(val)) score++;

  var width = (score / 5) * 100;
  var color = score <= 1 ? 'var(--danger)' : score <= 2 ? '#F59E0B' : score <= 3 ? '#F59E0B' : 'var(--success)';
  var key = score <= 1 ? 'pass_weak' : score <= 2 ? 'pass_medium' : score <= 3 ? 'pass_good' : 'pass_strong';

  strengthBar.style.width = width + '%';
  strengthBar.style.background = color;
  if (val.length > 0) {
    strengthText.setAttribute('data-i18n', key);
    strengthText.textContent = I18nStore.t(key);
  } else {
    strengthText.removeAttribute('data-i18n');
    strengthText.textContent = '';
  }
  strengthText.style.color = color;

  if(regPassword.classList.contains('is-invalid') && val.length >= 6){
    setError(regPassword, document.getElementById('regPasswordError'), false);
  }
});

regConfirm.addEventListener('input', function(){
  if(regConfirm.classList.contains('is-invalid') && regConfirm.value === regPassword.value){
    setError(regConfirm, document.getElementById('regConfirmError'), false);
  }
});

regName.addEventListener('input', function(){
  if(regName.classList.contains('is-invalid') && regName.value.trim().length >= 3){
    setError(regName, document.getElementById('regNameError'), false);
  }
});
regEmail.addEventListener('input', function(){
  if(regEmail.classList.contains('is-invalid') && regEmail.value.trim() && isValidEmail(regEmail.value.trim())){
    setError(regEmail, document.getElementById('regEmailError'), false);
  }
});

regForm.addEventListener('submit', function(e){
  e.preventDefault();
  var valid = true;

  if(!regName.value.trim() || regName.value.trim().length < 3){
    setError(regName, document.getElementById('regNameError'), true); valid = false;
  } else { setError(regName, document.getElementById('regNameError'), false); }

  if(!regEmail.value.trim() || !isValidEmail(regEmail.value.trim())){
    setError(regEmail, document.getElementById('regEmailError'), true); valid = false;
  } else { setError(regEmail, document.getElementById('regEmailError'), false); }

  if(!regPassword.value || regPassword.value.length < 6){
    setError(regPassword, document.getElementById('regPasswordError'), true); valid = false;
  } else { setError(regPassword, document.getElementById('regPasswordError'), false); }

  if(regConfirm.value !== regPassword.value){
    setError(regConfirm, document.getElementById('regConfirmError'), true); valid = false;
  } else { setError(regConfirm, document.getElementById('regConfirmError'), false); }

  if(!termsCheck.checked){
    document.getElementById('termsError').style.display = 'block'; valid = false;
  } else { document.getElementById('termsError').style.display = 'none'; }

  if(valid){
    showToast(I18nStore.t('toast_register_success'), 'bi-check-circle-fill', 'success');
    setTimeout(function(){ window.location.href = 'login.html'; }, 1500);
  }
});

document.getElementById('togglePass1').addEventListener('click', function(){
  var isPass = regPassword.type === 'password';
  regPassword.type = isPass ? 'text' : 'password';
  this.innerHTML = isPass ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
});
document.getElementById('togglePass2').addEventListener('click', function(){
  var isPass = regConfirm.type === 'password';
  regConfirm.type = isPass ? 'text' : 'password';
  this.innerHTML = isPass ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
});
</script>
</body>
</html>
