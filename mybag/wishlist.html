<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Daftar wishlist produk pilihan Anda di MyBag. Simpan produk favorit Anda dan masukkan ke keranjang kapan saja.">
<title>MyBag — Wishlist Saya</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="css/global.css" rel="stylesheet">
<style>
/* Wishlist specific styles */
.wishlist-remove-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: #ffffff;
  color: var(--danger);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 10;
}
.wishlist-remove-btn:hover {
  background: var(--danger);
  color: #ffffff;
  transform: scale(1.1);
}

.empty-state {
  text-align: center;
  padding: 5rem 1rem;
}
.empty-state .empty-icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(239, 68, 68, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1.5rem;
  font-size: 2.2rem;
  color: var(--danger);
}

/* Animation for items removal */
.fade-out {
  opacity: 0;
  transform: scale(0.9);
  transition: all 0.3s ease;
}

#wishlistGrid .col-lg-4 {
  animation: fadeUp .4s ease forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- Navbar -->
<div id="navbar"></div>

<!-- Wishlist Content -->
<section class="section" style="padding-top:7rem; min-height: 75vh;">
  <div class="container">
    <div class="text-center mb-5 reveal">
      <p class="eyebrow">Pilihan Anda</p>
      <h1 class="title">Wishlist Saya</h1>
      <p class="subtitle" id="wishlistCount">0 item tersimpan</p>
    </div>

    <div class="row g-4" id="wishlistGrid">
      <!-- Wishlist items will be injected here -->
    </div>

    <div id="emptyState" class="empty-state d-none">
      <div class="empty-icon"><i class="bi bi-heartbreak"></i></div>
      <h5 class="fw-semibold mb-2">Wishlist Kosong</h5>
      <p class="subtitle mb-3">Belum ada produk yang Anda tambahkan ke wishlist.</p>
      <a href="produk.html" class="btn-outline-main">Mulai Cari Produk <i class="bi bi-arrow-right ms-1"></i></a>
    </div>
  </div>
</section>

<!-- Footer -->
<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
function renderWishlist() {
  var wishlist = WishlistStore.get();
  var grid = document.getElementById('wishlistGrid');
  var emptyState = document.getElementById('emptyState');
  var countEl = document.getElementById('wishlistCount');

  // Update badge count heading
  countEl.textContent = wishlist.length + ' item' + (wishlist.length !== 1 ? 's' : '') + ' tersimpan';

  if (wishlist.length === 0) {
    grid.innerHTML = '';
    emptyState.classList.remove('d-none');
  } else {
    emptyState.classList.add('d-none');
    grid.innerHTML = wishlist.map(function(p, i) {
      return '<div class="col-lg-4 col-md-6" id="wishlist-item-' + p.id + '">' +
        '<div class="product-card position-relative">' +
          '<button class="wishlist-remove-btn" data-id="' + p.id + '" aria-label="Hapus dari Wishlist">' +
            '<i class="bi bi-trash3"></i>' +
          '</button>' +
          '<a href="detail-produk.html?id=' + p.id + '">' +
            '<div class="img-wrap"><img src="' + p.img + '" alt="' + p.name + '" loading="lazy"></div>' +
          '</a>' +
          '<div class="body">' +
            '<p class="cat-tag mb-1">' + p.cat + '</p>' +
            '<h6 class="fw-semibold mb-1">' + p.name + '</h6>' +
            '<p class="price mb-2">' + formatRupiah(p.price) + '</p>' +
            '<button class="btn-main w-100 justify-content-center btn-add-cart" data-id="' + p.id + '">' +
              'Add to Cart <i class="bi bi-bag-plus"></i>' +
            '</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }
}

// Event Delegation for Wishlist Actions
document.getElementById('wishlistGrid').addEventListener('click', function(e) {
  // Handle Add to Cart
  var addBtn = e.target.closest('.btn-add-cart');
  if (addBtn) {
    var id = Number(addBtn.dataset.id);
    var product = PRODUCTS.find(function(p) { return p.id === id; });
    if (product) {
      CartStore.add(product);
    }
    return;
  }

  // Handle Remove from Wishlist
  var removeBtn = e.target.closest('.wishlist-remove-btn');
  if (removeBtn) {
    var removeId = Number(removeBtn.dataset.id);
    var productToRemove = PRODUCTS.find(function(p) { return p.id === removeId; });
    
    // Add simple fade animation
    var itemCol = document.getElementById('wishlist-item-' + removeId);
    if (itemCol) {
      itemCol.classList.add('fade-out');
      setTimeout(function() {
        WishlistStore.remove(removeId);
        if (productToRemove) {
          showToast(productToRemove.name + ' dihapus dari wishlist!', 'bi-heart', 'error');
        }
        renderWishlist();
      }, 300);
    } else {
      WishlistStore.remove(removeId);
      renderWishlist();
    }
  }
});

document.addEventListener('DOMContentLoaded', function() {
  renderWishlist();
});
</script>
</body>
</html>
